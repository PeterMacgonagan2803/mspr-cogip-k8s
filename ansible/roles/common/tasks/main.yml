---
- name: Mettre à jour le cache APT
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Installer les paquets de base
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - gnupg2
      - software-properties-common
      - apt-transport-https
      - ca-certificates
      - nfs-common
      - open-iscsi
      - jq
      - unzip
    state: present

- name: Configurer le hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Ajouter les entrées /etc/hosts pour le cluster
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item].ansible_host }} {{ item }}"
    state: present
  loop: "{{ groups['all'] }}"
  when: hostvars[item].ansible_host is defined

- name: Désactiver le swap
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Désactiver le swap au démarrage
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '.*swap.*'
    state: absent

- name: Charger les modules noyau requis
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - br_netfilter
    - overlay

- name: Persister les modules noyau
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      br_netfilter
      overlay

- name: Configurer les paramètres sysctl pour Kubernetes
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: yes
    reload: yes
  loop:
    - { key: "net.bridge.bridge-nf-call-iptables", value: "1" }
    - { key: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { key: "net.ipv4.ip_forward", value: "1" }
